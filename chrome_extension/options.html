<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Ustawienia Oceniacza</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; width: 350px; }
    h2 { font-size: 18px; margin-bottom: 15px; }
    .opcja { margin-bottom: 10px; font-size: 15px; }
    button { 
        margin-top: 20px; padding: 10px 15px; cursor: pointer; 
        background: #0078d7; color: white; border: none; border-radius: 4px; font-weight: bold;
    }
    button:hover { background: #005a9e; }
    #status { margin-top: 15px; color: green; font-size: 14px; font-weight: bold; }
  </style>
</head>
<body>
  <h2>Wybierz format wyświetlania:</h2>
  
  <div class="opcja">
    <input type="radio" id="gwiazdki" name="skala" value="gwiazdki" checked>
    <label for="gwiazdki">Gwiazdki (1.0 ⭐ - 5.0 ⭐)</label>
  </div>
  
  <div class="opcja">
    <input type="radio" id="punkty" name="skala" value="punkty">
    <label for="punkty">Skala punktowa (0/10 - 10/10)</label>
  </div>
  
  <button id="zapisz">Zapisz ustawienia</button>
  <div id="status"></div>

  <script src="options.js"></script>
</body>
</html>
